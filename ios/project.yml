name: WhiteRabbit
options:
  bundleIdPrefix: com.whiterabbit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  WhiteRabbitKit:
    path: WhiteRabbitKit
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    exactVersion: "1.29.0"

targets:
  WhiteRabbit:
    type: application
    platform: iOS
    sources:
      - path: WhiteRabbitApp
    dependencies:
      - package: WhiteRabbitKit
        product: WhiteRabbitKit
      - package: SwiftProtobuf
        product: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whiterabbit.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WhiteRabbitApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: NO
