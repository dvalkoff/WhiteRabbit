services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whiterabbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whiterabbit}
      POSTGRES_DB: ${POSTGRES_DB:-whiterabbit}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whiterabbit}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # TURN/STUN for WebRTC NAT traversal. Uses the shared-secret (REST) auth scheme;
  # the server mints time-limited credentials at /v1/turn. host networking keeps
  # the relay port range reachable without enumerating it.
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    command: >
      -n --no-cli --no-tls --no-dtls
      --listening-port=3478
      --realm=${WR_TURN_REALM:-whiterabbit}
      --use-auth-secret --static-auth-secret=${TURN_SECRET:-dev-turn-secret}
      --min-port=49160 --max-port=49200
      --listening-ip=0.0.0.0

  server:
    build:
      context: ./server
    environment:
      WR_HTTP_ADDR: ":8080"
      WR_DATABASE_URL: "postgres://${POSTGRES_USER:-whiterabbit}:${POSTGRES_PASSWORD:-whiterabbit}@postgres:5432/${POSTGRES_DB:-whiterabbit}?sslmode=disable"
      WR_REDIS_ADDR: "redis:6379"
      WR_JWT_SECRET: ${WR_JWT_SECRET:-dev-insecure-change-me}
      WR_MINIO_ENDPOINT: "minio:9000"
      # Endpoint clients use; presigned URLs are signed for this host. The iOS
      # simulator reaches MinIO via the host's published port at localhost:9000.
      WR_MINIO_PUBLIC_ENDPOINT: "localhost:9000"
      WR_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      WR_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WR_MINIO_BUCKET: "wr-blobs"
      # Clients (the iOS simulator) reach coturn on the host at localhost:3478.
      WR_TURN_HOST: "localhost:3478"
      WR_TURN_REALM: ${WR_TURN_REALM:-whiterabbit}
      WR_TURN_SECRET: ${TURN_SECRET:-dev-turn-secret}
      WR_INSTANCE_ID: "" # auto if empty
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Fixed host port so clients always reach the server at localhost:8080.
    # To run multiple instances for the cross-instance/scaling demo, start extra
    # containers on other ports sharing this postgres/redis (see README), or front
    # them with an nginx/traefik LB (round-robin is fine — no sticky sessions).
    ports:
      - "8080:8080"

volumes:
  pgdata:
  miniodata:
